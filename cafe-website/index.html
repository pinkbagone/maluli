<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maluli</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LANGUAGE SWITCHER -->
  <div id="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ka')">🇬🇪</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧</button>
    <button class="lang-btn" onclick="setLang('ru')">🇷🇺</button>
  </div>

  <!-- HERO -->
  <section id="hero">
    <img src="logo.png.png" alt="Maluli Logo" id="logo" />
    <h1>MALULI</h1>
    <p id="tagline"></p>
  </section>

  <div class="divider"></div>

  <!-- MENU -->
  <section id="menu">
    <h2 id="menu-title"></h2>
    <div id="category-nav"></div>
    <div id="menu-container"></div>
  </section>

  <!-- SOCIALS -->
  <section id="socials">
    <h2 id="find-us-title"></h2>
    <div id="social-links">
      <a href="https://instagram.com/maluli" target="_blank">Instagram</a>
      <a href="https://facebook.com/maluli" target="_blank">Facebook</a>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p id="footer-address"></p>
    <p id="footer-hours"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
